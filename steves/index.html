<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STEVES AI - Redefining Innovation</title>
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/44tee6t2a/1782462216136/1000082498.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: '#E61E25', /* STEVES AI Red */
              secondary: '#1a1a1a', /* Dark Black/Gray */
              dark: '#000000',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #E61E25;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #c41920;
      }
      .blob-bg {
        background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
      }
      .clip-skew-right {
        /* Fixed 80px slant */
        clip-path: polygon(0 0, 100% 0, calc(100% - 80px) 100%, 0% 100%);
      }
      
      /* Global Smooth Scroll & Padding for Fixed Header */
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px; /* Adjusts for the fixed header height (approx 80-100px) */
      }
    </style>

  }
}
</script>
